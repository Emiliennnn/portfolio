        title: Gas Source Localization with Nano Aerial Vehicles
        link: https://www.epfl.ch/labs/disal/
        link_text: DISAL Lab, EPFL
        quote: >
          Locating gas leaks efficiently using physics-based gas distribution mapping.
        description: | # this will include new lines to allow paragraphs
          Semester/master project at DISAL (Distributed Intelligent Systems and Algorithms Lab). The goal is to locate gas leaks as efficiently as possible using a Nano Aerial Vehicle, building on physics-based gas mapping approaches for mobile robotics.

