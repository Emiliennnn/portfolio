# About Section
about_title: About Me
about_profile_image: Directory of profile image (eg. images/profile.jpg)
about_content: | # this will include new lines to allow paragraphs
  I am a Master's student in Robotics at EPFL (École Polytechnique Fédérale de Lausanne). I have been focusing on Control Theory, including robust, adaptive and optimal controllers and state estimators, system identification, as well as networked and distributed systems.

  I have a deep interest in space and energy applications, and more generally in mobile robotics. I aim to contribute to the development of innovative technologies that unite scientific research, sustainability and efficient use of resources. My goal is to support long-term engineering that benefits both the environment and society.

