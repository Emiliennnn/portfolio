about_content: | # this will include new lines to allow paragraphs
  I'm a Robotics MSc student at EPFL with a background in Microengineering. I'm interested in spacecraft systems, control, and mobile/aerial robotics, and I currently contribute to student-led robotics and space projects at EPFL.

  <!-- TODO: add 2-3 more sentences in your own voice -- what draws you to robotics, what kind of problems you like working on, anything else that makes this section feel like you. -->

