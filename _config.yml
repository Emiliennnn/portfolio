  - title: Publication
    layout: list
    content:
      - layout: top
        title: Failure-Tolerant and Power-Optimal ADCS Design for 3U CubeSats
        sub_title: 5th Symposium on Space Educational Activities (SSEA)
        sub_title_link: https://ssea.space/
        caption: 04/2026
        expandable: true
        expand_label: Read Paper
        # To embed the PDF instead of the abstract: drop the file at eg.
        # assets/papers/ssea-2026-adcs.pdf, then uncomment the line below
        # with that path and change expand_label above to "Read paper".
        pdf: assets/papers/ssea-2026-adcs.pdf
        quote: >
          Presented and published at the 5th SSEA, hosted by the Technical University of Munich and organised with ESA.
        description: | # this will include new lines to allow paragraphs
          Nanosatellites have emerged over the past decade as a cost-effective solution for low Earth orbit missions that do not require large payload volumes. Among them, CubeSats have gained relevance, especially in academic and student-led projects. Their design, however, remains highly challenging due to stringent constraints on volume, power consumption, and attitude accuracy imposed by mission requirements and payload specifications. Typical CubeSat missions involve operation modes, including Nadir-pointing, Sun-pointing and Point-Tracking, answering needs for data transmission, solar charging and ground station tracking. These modes demand an actuator configuration capable of versatile control (typically combining magnetic torquers and reaction wheels) and a robust sensor layout for attitude determination. Consequently, the design of the Attitude Determination and Control System is critical, requiring not only precise control and estimation capabilities but also resilience to actuator or sensor failures, all under tight power and computational constraints. In this work, a failure-tolerant ADCS architecture for 3U CubeSats is proposed, integrating redundant actuators and sensors, followed by a comparative study on power-efficient control. This study aims to explore ways to balance reliability with energy efficiency, mitigating the additional power demand introduced by redundancy through optimized control allocation. Computational efficiency is also a key objective, ensuring onboard feasibility. Several control approaches are investigated through a developed realistic MATLAB simulation, including classical Proportional-Integral-Derivative control, Linear Quadratic Regulation in both finite and infinite horizon formulations, and Model Predictive Control. On the estimation side, sensor fusion techniques for accurate attitude reconstruction under disturbances are employed, exploring the performance of a Multiplicative Extended Kalman Filter subject to model mismatch. This study contributes a systematic comparison of control strategies tailored for power- and computation-limited CubeSat platforms, emphasizing practical implementability of fault-tolerant ADCS architectures in future 3U missions.

        image: images/esa_logo.png
        image_2: images/ssea_logo.png
        image_2_alt: 5th SSEA logo


