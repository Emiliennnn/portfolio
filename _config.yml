            icon: fab fa-github
            url: # TODO: add link if the repo is public
        quote: >
          Failure-tolerant, power-optimal ADCS design for a 3U CubeSat.
        description: | # this will include new lines to allow paragraphs
          As ADCS Lead Engineer for the EPFL Spacecraft Team, working on CHESS — a student-led 3U CubeSat constellation for high-performance time-of-flight mass spectrometry of Earth's atmosphere. Designed a redundant attitude determination and control system architecture, comparing attitude controllers to minimize energy consumption during operation. Presented this work at the 5th Symposium on Space Educational Activities (SSEA) in Munich.

          <!-- TODO: add your own technical detail -- what controller types you compared, what tools/languages you used, what the outcome was. -->
